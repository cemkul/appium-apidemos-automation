name: Appium Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  android-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Appium
        run: |
          npm install -g appium@3.3.0
          appium driver install uiautomator2

      - name: Start Appium server
        run: |
          appium &
          sleep 10

      - name: Run tests
        run: mvn clean test